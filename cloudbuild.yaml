# Cloud Build configuration for Options Wheel Strategy
# Automatically builds and deploys to Cloud Run when code is pushed to GitHub

steps:
  # Step 1: Run critical tests only (faster)
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r requirements.txt
        pip install --no-cache-dir pytest pytest-mock pytest-asyncio
        python -m pytest tests/ -v --tb=short || exit 1
    id: 'run-tests'

  # Step 2: Build the trading bot container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'deploy/Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-strategy:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-strategy:latest'
      - '.'
    id: 'build-bot-image'
    waitFor: ['run-tests']

  # Step 3: Build the dashboard container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-dashboard:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-dashboard:latest'
      - '.'
    dir: 'dashboard'
    id: 'build-dashboard-image'
    waitFor: ['run-tests']

  # Step 4: Push the trading bot container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-strategy'
    id: 'push-bot-image'
    waitFor: ['build-bot-image']

  # Step 5: Push the dashboard container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-dashboard'
    id: 'push-dashboard-image'
    waitFor: ['build-dashboard-image']

  # Step 6: Deploy trading bot to Cloud Run (canary - no traffic)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'options-wheel-strategy'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-strategy:$COMMIT_SHA'
      - '--region=us-central1'
      - '--memory=512Mi'
      - '--concurrency=10'
      - '--max-instances=1'
      - '--min-instances=0'
      - '--timeout=300'
      - '--set-env-vars=ALPACA_PAPER_TRADING=true,GCP_PROJECT=$PROJECT_ID'
      - '--no-traffic'
      - '--tag=canary'
    id: 'deploy-bot-canary'
    waitFor: ['push-bot-image']

  # Step 7: Verify the trading bot canary revision is healthy
  # Cannot curl authenticated Cloud Run from Cloud Build, so verify via API
  # that the revision is ready and serving on the canary tag.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Verifying canary revision is ready..."
        STATUS=$(gcloud run revisions list --service=options-wheel-strategy \
          --region=us-central1 --limit=1 \
          --format="value(status.conditions[0].status)")
        echo "Latest revision status: $${STATUS}"
        if [ "$${STATUS}" != "True" ]; then
          echo "FAIL: Canary revision not ready"
          exit 1
        fi
        echo "PASS: Canary revision is ready"
    id: 'smoke-test-bot'
    waitFor: ['deploy-bot-canary']

  # Step 8: Shift traffic to new trading bot revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'options-wheel-strategy'
      - '--to-latest'
      - '--region=us-central1'
    id: 'promote-bot'
    waitFor: ['smoke-test-bot']

  # Step 9: Deploy dashboard to Cloud Run (canary - no traffic)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'options-wheel-dashboard'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-dashboard:$COMMIT_SHA'
      - '--region=us-central1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=2'
      - '--min-instances=0'
      - '--timeout=300'
      - '--set-env-vars=TRADING_BOT_URL=https://options-wheel-strategy-799970961417.us-central1.run.app,GCP_PROJECT=$PROJECT_ID'
      - '--no-traffic'
      - '--tag=canary'
    id: 'deploy-dashboard-canary'
    waitFor: ['push-dashboard-image']

  # Step 10: Verify the dashboard canary revision is healthy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Verifying dashboard canary revision is ready..."
        STATUS=$(gcloud run revisions list --service=options-wheel-dashboard \
          --region=us-central1 --limit=1 \
          --format="value(status.conditions[0].status)")
        echo "Latest revision status: $${STATUS}"
        if [ "$${STATUS}" != "True" ]; then
          echo "FAIL: Dashboard canary revision not ready"
          exit 1
        fi
        echo "PASS: Dashboard canary revision is ready"
    id: 'smoke-test-dashboard'
    waitFor: ['deploy-dashboard-canary']

  # Step 11: Shift traffic to new dashboard revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'options-wheel-dashboard'
      - '--to-latest'
      - '--region=us-central1'
    id: 'promote-dashboard'
    waitFor: ['smoke-test-dashboard']

# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 30

# Service account for Cloud Build
serviceAccount: 'projects/gen-lang-client-0607444019/serviceAccounts/799970961417@cloudbuild.gserviceaccount.com'

# Timeout for the entire build
timeout: '900s'  # 15 minutes (increased for dashboard build)

# Substitutions for build variables
substitutions:
  _SERVICE_NAME: 'options-wheel-strategy'
  _REGION: 'us-central1'

# Images to be pushed to registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-strategy:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-strategy:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-dashboard:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/options-wheel/options-wheel-dashboard:latest'